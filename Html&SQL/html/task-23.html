<!DOCTYPE html>
<html>
<head>
    <title>ISC Questionnaire</title>
</head>
<body>

    <h1>ISC Questionnaire</h1>

    <form>

        <label><b>Student Name:</b></label>
        <input type="text" size="40"><br><br>

        <label><b>Password:</b></label>
        <input type="password" size="40"><br><br>

        <b>Preferred Courses:</b><br>

        <input type="checkbox"> Networks
        <input type="checkbox"> Web Programming
        <input type="checkbox"> Data Structures
        <input type="checkbox"> OS

        <br><br>

        <b>How many hours do you study every day?</b><br>

        <input type="radio" name="study"> 1-3 hours
        <input type="radio" name="study"> 4-5 hours
        <input type="radio" name="study"> More than 6 hours

        <br><br>

        <label><b>Rate ISC Department:</b></label>

        <select>
            <option>Excellent</option>
            <option>Very Good</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>

        <br><br>

        <label><b>Further Comments:</b></label><br>

        <textarea rows="8" cols="70"></textarea>

        <br><br>

        <input type="reset" value="Reset">
        <input type="submit" value="Submit Form">

    </form>

</body>
</html>
