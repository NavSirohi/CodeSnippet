<!DOCTYPE html>
<html>
<head>
    <title>Audio and Video</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .frame {
            width: 50%;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="frame">
        <h2>Audio Clip</h2>
        <audio controls>
            <source src="audio.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="frame">
        <h2>Video Clip</h2>
        <video width="400" controls>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

</body>
</html>
