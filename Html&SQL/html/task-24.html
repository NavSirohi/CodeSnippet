<!DOCTYPE html>
<html>
<head>
    <title>New User Registration Form</title>
</head>
<body>

    <h1>New User Registration Form</h1>

    <form>

        <label>Username:</label>
        <input type="text" name="username"><br><br>

        <label>E-mail Address:</label>
        <input type="email" name="email" placeholder="name@domain.com"><br><br>

        <label>Date of Birth:</label>
        <input type="date" name="dob"><br><br>

        <label>HTML Experience Years:</label>
        0
        <input type="range" name="experience" min="0" max="100">
        100 years.
        <br><br>

        <label>Number of Children:</label>
        <input type="number" name="children" min="0" max="20" value="0"><br><br>

        <label>Personal Page URL:</label>
        <input type="url" name="website" placeholder="http://domain.com"><br><br>

        <label>Registration Renewal Month:</label>
        <input type="month" name="renewal"><br><br>

        <input type="submit" value="Submit">
        <br><br>

        <input type="reset" value="Clear">

    </form>

</body>
</html>
