<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Styling Example</title>

    <style>
       
        body {
            background-image: url("https://picsum.photos/1200/800");
            background-repeat: no-repeat;    
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            color: darkblue;
            font-family: Georgia, serif;
            text-align: center;
        }

        .para1 {
            color: red;
            font-family: Verdana, sans-serif;
            font-size: 20px;
            font-style: italic;
        }

        .para2 {
            color: green;
            font-family: "Courier New", monospace;
            font-size: 18px;
            font-weight: bold;
        }

        .box {
            width: 500px;
            margin: 20px auto;
            padding: 20px;
            color: white;
            text-align: center;

            background-image: url("https://picsum.photos/500/250");
            background-repeat: repeat-x;  
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <h1>CSS Demonstration</h1>

    <p class="para1">
        This paragraph uses Verdana font, red color, and italic style.
    </p>

    <p class="para2">
        This paragraph uses Courier New font, green color, and bold style.
    </p>

    <div class="box">
        This element has its own background image with
        <strong>background-repeat: repeat-x</strong>.
    </div>

</body>
</html>
