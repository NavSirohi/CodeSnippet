<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Pseudo Classes</title>

    <style>
        a:link {
            color: blue;
            text-decoration: none;
        }

        /* Visited link */
        a:visited {
            color: purple;
        }

        /* Mouse over link */
        a:hover {
            color: red;
            text-decoration: underline;
        }

        /* Selected/Active link */
        a:active {
            color: green;
        }
    </style>
</head>
<body>
    <h2>Styling Links Using CSS Pseudo-Classes</h2>
    <a href="https://www.google.com" target="_blank">
        Visit Google
    </a>

</body>
</html>
